name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: 🔨 Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Type-check (tsc)
        run: npx tsc --noEmit

      - name: 🏗️ Build
        run: npm run build
        env:
          # Add real env vars here when backend is ready
          # VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          NODE_ENV: production
