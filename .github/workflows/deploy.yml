name: Deploy Vue to Hostinger (SFTP)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Build
        run: |
          npm install
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
          VITE_APP_VERSION: ${{ secrets.VITE_APP_VERSION }}
          VITE_S3_BUCKET_URL: ${{ secrets.VITE_S3_BUCKET_URL }}

      - name: Verify Build
        run: npm run check-build

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }} # ใส่เป็น IP Address ของ Hostinger
          username: ${{ secrets.FTP_USERNAME }} # ชื่อผู้ใช้ SSH
          ssh_private_key: ${{ secrets.FTP_SSH_KEY || secrets.HOSTINGER_SSH_KEY }} # บังคับใช้ SSH Key เพื่อความเสถียรและป้องกันการบล็อกโดย Hostinger Firewall
          port: 65002
          local_path: "./dist/*" # ไฟล์จากโฟลเดอร์ dist
          remote_path: "/home/u559164242/domains/phanadrug.com/public_html/"
          sftp_only: true

      # ----------------------------------------------------
      # Discord Notifications
      # ----------------------------------------------------
      - name: Send Discord Notification on Success
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [[ "$COMMIT_MESSAGE" =~ ^[Cc][Ii] ]] || [[ "$COMMIT_MESSAGE" == *"[CI]"* ]] || [[ "$COMMIT_MESSAGE" == *"[ci]"* ]]; then
            echo "CI commit detected. Skipping Discord notification."
            exit 0
          fi

          COLOR=3066993 # Default to Green for Success
          if [[ "$COMMIT_MESSAGE" == *"feat 🚀"* ]]; then COLOR=3066993;
          elif [[ "$COMMIT_MESSAGE" == *"fix 🐛"* ]]; then COLOR=15158332;
          elif [[ "$COMMIT_MESSAGE" == *"fix 🔨"* ]]; then COLOR=15105570;
          elif [[ "$COMMIT_MESSAGE" == *"refactor ♻️"* ]]; then COLOR=10181046; fi

          PAYLOAD=$(jq -n \
            --arg actor "$ACTOR" \
            --arg msg "$COMMIT_MESSAGE" \
            --arg url "$COMMIT_URL" \
            --arg repo "$REPO_NAME" \
            --argjson color "$COLOR" \
            '{
              content: "✅ **\($actor)** Deploy โปรเจกต์ **\($repo)** (branch `main`) ขึ้น Production สำเร็จแล้ว!",
              embeds: [{
                title: "🚀 ดูรายละเอียดการเปลี่ยนแปลง (คลิกเพื่อดู Diff)",
                url: $url,
                description: $msg,
                color: $color
              }]
            }')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"

      - name: Send Discord Notification on Failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REPO_NAME: ${{ github.event.repository.name }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          PAYLOAD=$(jq -n \
            --arg actor "$ACTOR" \
            --arg msg "$COMMIT_MESSAGE" \
            --arg url "$RUN_URL" \
            --arg repo "$REPO_NAME" \
            '{
              content: "❌ **\($actor)** Deploy โปรเจกต์ **\($repo)** (branch `main`) ล้มเหลว! โปรดตรวจสอบสถานะการรัน",
              embeds: [{
                title: "⚠️ คลิกเพื่อดูสาเหตุและรายละเอียดความผิดพลาดใน GitHub Actions",
                url: $url,
                description: $msg,
                color: 15158332 # Red for Failure
              }]
            }')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"
