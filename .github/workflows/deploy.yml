name: Deploy Vue to Hostinger (SFTP)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Build
        run: |
          npm install
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }} # ใส่เป็น IP Address ของ Hostinger
          username: ${{ secrets.FTP_USERNAME }} # ชื่อผู้ใช้ SSH
          password: ${{ secrets.FTP_PASSWORD }} # รหัสผ่าน SSH
          port: 65002
          local_path: "./dist/*" # ไฟล์จากโฟลเดอร์ dist
          remote_path: "/home/u559164242/domains/phanadrug.com/public_html/"
          sftp_only: true
